openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CORTEX AI Digital Brain OS X API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chat
    description: AI Assistant chat
  - name: memory
    description: Memory engine
  - name: activity
    description: Activity logs
  - name: tasks
    description: Task management
  - name: notes
    description: Notes
  - name: system
    description: System monitoring
  - name: analytics
    description: Analytics and insights
  - name: notifications
    description: Notifications
  - name: commands
    description: Command history

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /chat/messages:
    get:
      operationId: getChatMessages
      tags: [chat]
      summary: Get chat message history
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to the AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /memory:
    get:
      operationId: getMemories
      tags: [memory]
      summary: Get all memories
      responses:
        "200":
          description: List of memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Memory"
    post:
      operationId: createMemory
      tags: [memory]
      summary: Create a new memory entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryInput"
      responses:
        "201":
          description: Created memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"

  /memory/{id}:
    delete:
      operationId: deleteMemory
      tags: [memory]
      summary: Delete a memory
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /activity:
    get:
      operationId: getActivityLogs
      tags: [activity]
      summary: Get activity logs
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        "200":
          description: Activity logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLog"
    post:
      operationId: logActivity
      tags: [activity]
      summary: Log an activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityLogInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLog"

  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: Get all tasks
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /notes:
    get:
      operationId: getNotes
      tags: [notes]
      summary: Get all notes
      responses:
        "200":
          description: Notes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}:
    patch:
      operationId: updateNote
      tags: [notes]
      summary: Update a note
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /system/stats:
    get:
      operationId: getSystemStats
      tags: [system]
      summary: Get current system stats
      responses:
        "200":
          description: System stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStats"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get analytics dashboard summary
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/heatmap:
    get:
      operationId: getActivityHeatmap
      tags: [analytics]
      summary: Get activity heatmap data
      responses:
        "200":
          description: Heatmap data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeatmapEntry"

  /insights:
    get:
      operationId: getInsights
      tags: [analytics]
      summary: Get AI-generated insights
      responses:
        "200":
          description: Insights list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /commands:
    get:
      operationId: getCommands
      tags: [commands]
      summary: Get command history
      responses:
        "200":
          description: Commands list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Command"
    post:
      operationId: executeCommand
      tags: [commands]
      summary: Execute a command
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandInput"
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Command"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ChatMessage:
      type: object
      properties:
        id: { type: integer }
        role: { type: string, enum: [user, assistant] }
        content: { type: string }
        createdAt: { type: string }
      required: [id, role, content, createdAt]

    ChatMessageInput:
      type: object
      properties:
        content: { type: string, minLength: 1 }
      required: [content]

    Memory:
      type: object
      properties:
        id: { type: integer }
        type: { type: string }
        content: { type: string }
        importance: { type: integer }
        createdAt: { type: string }
      required: [id, type, content, importance, createdAt]

    MemoryInput:
      type: object
      properties:
        type: { type: string }
        content: { type: string, minLength: 1 }
        importance: { type: integer, default: 1 }
      required: [content]

    ActivityLog:
      type: object
      properties:
        id: { type: integer }
        action: { type: string }
        module: { type: string }
        details: { type: ["string", "null"] }
        timestamp: { type: string }
      required: [id, action, module, timestamp]

    ActivityLogInput:
      type: object
      properties:
        action: { type: string, minLength: 1 }
        module: { type: string, minLength: 1 }
        details: { type: string }
      required: [action, module]

    Task:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: ["string", "null"] }
        status: { type: string, enum: [pending, in_progress, completed] }
        priority: { type: string, enum: [low, medium, high, critical] }
        dueDate: { type: ["string", "null"] }
        createdAt: { type: string }
      required: [id, title, status, priority, createdAt]

    TaskInput:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        priority: { type: string, enum: [low, medium, high, critical], default: medium }
        dueDate: { type: string }
      required: [title]

    TaskUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        status: { type: string, enum: [pending, in_progress, completed] }
        priority: { type: string, enum: [low, medium, high, critical] }
        dueDate: { type: string }

    Note:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        content: { type: string }
        tags: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, title, content, createdAt, updatedAt]

    NoteInput:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        content: { type: string }
        tags: { type: string }
      required: [title]

    NoteUpdate:
      type: object
      properties:
        title: { type: string }
        content: { type: string }
        tags: { type: string }

    SystemStats:
      type: object
      properties:
        cpu: { type: number }
        ram: { type: number }
        ramTotal: { type: number }
        ramUsed: { type: number }
        disk: { type: number }
        diskTotal: { type: number }
        diskUsed: { type: number }
        network: { type: number }
        battery: { type: number }
        uptime: { type: number }
        processes: { type: integer }
        temperature: { type: number }
      required: [cpu, ram, ramTotal, ramUsed, disk, diskTotal, diskUsed, network, battery, uptime, processes, temperature]

    AnalyticsSummary:
      type: object
      properties:
        totalCommands: { type: integer }
        totalMemories: { type: integer }
        totalTasks: { type: integer }
        completedTasks: { type: integer }
        totalNotes: { type: integer }
        aiInteractions: { type: integer }
        productivityScore: { type: number }
        mostActiveHour: { type: integer }
        topCommand: { type: string }
        weeklyActivity: { type: array, items: { type: integer } }
      required: [totalCommands, totalMemories, totalTasks, completedTasks, totalNotes, aiInteractions, productivityScore, mostActiveHour, topCommand, weeklyActivity]

    HeatmapEntry:
      type: object
      properties:
        day: { type: integer }
        hour: { type: integer }
        value: { type: integer }
      required: [day, hour, value]

    Insight:
      type: object
      properties:
        id: { type: integer }
        category: { type: string }
        title: { type: string }
        description: { type: string }
        confidence: { type: number }
        createdAt: { type: string }
      required: [id, category, title, description, confidence, createdAt]

    Notification:
      type: object
      properties:
        id: { type: integer }
        type: { type: string, enum: [info, warning, alert, success] }
        title: { type: string }
        message: { type: string }
        read: { type: boolean }
        createdAt: { type: string }
      required: [id, type, title, message, read, createdAt]

    Command:
      type: object
      properties:
        id: { type: integer }
        command: { type: string }
        output: { type: ["string", "null"] }
        status: { type: string, enum: [success, error, running] }
        executedAt: { type: string }
      required: [id, command, status, executedAt]

    CommandInput:
      type: object
      properties:
        command: { type: string, minLength: 1 }
      required: [command]
