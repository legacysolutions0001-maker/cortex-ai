services:
    - type: web
      name: cortex-ai
      runtime: node
      region: oregon
      plan: free
      buildCommand: |
        npm install -g pnpm &&
        pnpm install --no-frozen-lockfile &&
        NODE_ENV=production PORT=3000 BASE_PATH=/ pnpm --filter @workspace/cortex-ai run build &&
        pnpm --filter @workspace/api-server run build &&
        pnpm --filter @workspace/db run push
      startCommand: NODE_ENV=production pnpm --filter @workspace/api-server run start
      envVars:
        - key: NODE_ENV
          value: production
        - key: PORT
          value: 10000
        - key: DATABASE_URL
          sync: false
        - key: SESSION_SECRET
          generateValue: true
  