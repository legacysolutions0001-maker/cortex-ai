services:
  - type: web
    name: cortex-ai
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      corepack enable pnpm &&
      pnpm install --frozen-lockfile &&
      NODE_ENV=production PORT=3000 BASE_PATH=/ pnpm --filter @workspace/cortex-ai run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: NODE_ENV=production pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: cortex-ai-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: cortex-ai-db
    databaseName: cortex_ai
    plan: free
    region: oregon
